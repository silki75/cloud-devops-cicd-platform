name: Azure Container Apps CI/CD Deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/azure-container-apps-deploy.yml"

permissions:
  contents: read
  packages: write

env:
  RESOURCE_GROUP: azdevopsca-dev-rg
  CONTAINER_APP_NAME: azdevopsca-dev-app
  IMAGE_NAME: cloud-devops-cicd-platform

jobs:
  build-and-deploy:
    name: Build, Push to GHCR, and Deploy to Azure Container Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Convert repository owner to lowercase
        id: repo
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: image
        run: |
          IMAGE="ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "image_latest=$IMAGE_LATEST" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.image.outputs.image }} -t ${{ steps.image.outputs.image_latest }} ./app

      - name: Push Docker image to GHCR
        run: |
          docker push ${{ steps.image.outputs.image }}
          docker push ${{ steps.image.outputs.image_latest }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Azure Container App image
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ steps.image.outputs.image }}

      - name: Show Azure Container App URL
        run: |
          az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv
